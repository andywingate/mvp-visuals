name: Scrape MVP data and update GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # Run at 02:00 UTC every Sunday
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      top:
        description: "Maximum number of profiles to fetch (leave blank for all)"
        required: false
        default: ""

concurrency:
  group: scrape-and-deploy
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    name: Scrape → Commit → Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: |
          TOP="${{ github.event.inputs.top }}"
          if [ -n "$TOP" ]; then
            python scraper/scrape_mvps.py --top "$TOP"
          else
            python scraper/scrape_mvps.py
          fi

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/mvps.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update MVP data [skip ci]"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
